services:
  nudge:
    build:
      context: .
      dockerfile: Dockerfile
    image: nudge-me-after-work:local
    container_name: nudge-me-after-work
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # 이름 있는 볼륨: 이미지의 /data(app:app) 소유권을 물려받아 비루트(uid 10001)로도
      # 바로 쓸 수 있다. bind 마운트였다면 호스트 디렉터리를 직접 chown해야 한다.
      - nudge-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nudge-data:
