# 저녁 넛지 앱 리버스 프록시.
# 이 nginx가 최종 엣지다 — TLS를 여기서 종단한다(DuckDNS 도메인 인증서를 직접 넣음).
# 인터넷 → DuckDNS(https) → 공유기 포트포워딩 → 이 nginx(443) → 단일 uvicorn(nudge:8000).
# 앞단 프록시가 없으므로 원 스킴을 이어받지 않고 https로 확정한다.
# 스톡 nginx 이미지의 http 블록이 이 파일을 include 하므로 upstream/server만 둔다.

upstream nudge_app {
    # compose 서비스 DNS 이름. nginx 로드 시 컨테이너 resolv.conf의 네임서버로 1회 해석한다.
    # (동적 `resolve`는 쓰지 않는다 — 그 모드가 요구하는 `resolver`가 런타임마다 다르다:
    #  Docker는 127.0.0.11, Podman aardvark-dns는 네트워크 게이트웨이라 하드코딩이 깨진다.)
    # 재배포로 `nudge`만 recreate돼 IP가 바뀌면 이 정적 해석은 옛 IP를 붙잡아 502가 되므로,
    # 배포 시 nginx도 함께 recreate한다(compose down/up 또는 `up -d --force-recreate nginx`).
    # APScheduler가 lifespan에서 돌아 워커를 늘리지 않으므로 인스턴스는 하나뿐이다.
    server nudge:8000;
    # 업스트림 keepalive로 매 요청 TCP 핸드셰이크를 피한다(아래 Connection "" 와 한 쌍).
    keepalive 16;
}

# http→https 승격 시 보낼 대상 오소리티(호스트[:포트])를 Host 헤더로 결정한다.
# nginx는 컨테이너 내부에서 80/443만 보고 호스트의 포트 매핑(18080/18443)은 모른다.
# 그래서 LAN 직결(Host에 :18080이 붙음)은 포트를 https 포트로 바꿔줘야 하고,
# 공개 도메인(표준 80, 포트 없음)은 포트를 떼 표준 443을 가리키게 둔다.
# 여기 박힌 18080/18443은 compose 포트 매핑과 반드시 일치해야 한다.
map $http_host $https_authority {
    "~*^(?<host_only>[^:]+):18080$" "$host_only:18443"; # LAN 직결: http 포트→https 포트
    default $host; # 공개 도메인: 표준 443
}

# HTTP(80): 내부 헬스체크와 http→https 승격만 담당한다. 실제 프록시는 443만 한다.
server {
    listen 80 default_server;
    server_name _;
    server_tokens off; # Server 헤더·에러 페이지의 nginx 버전 노출 차단

    # nginx 자체 라이브니스. compose 헬스체크가 http://127.0.0.1/healthz 로 때리므로
    # 아래 https 리다이렉트에 걸리면 안 된다(인증서 불일치로 헬스체크가 깨짐) → 직접 응답.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 그 외 평문 접근은 전부 https로 승격. 대상 오소리티는 위 $https_authority가 정한다
    # (공개 도메인→표준 443, LAN 직결→:18443). HTTP Basic 자격증명이 평문으로 흐르지 않도록
    # 관리/webhook은 https에서만 처리된다.
    location / {
        return 301 https://$https_authority$request_uri;
    }
}

# HTTPS(443): TLS 종단 + 실제 리버스 프록시.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;
    server_tokens off; # Server 헤더·에러 페이지의 nginx 버전 노출 차단

    # 직접 준비한 DuckDNS 도메인 인증서. compose가 ./nginx/certs 를 여기에 ro 마운트한다.
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS: 한번 https로 온 브라우저를 이후 https로 고정. 인증서가 끊기면 접속도 막히므로
    # 갱신 자신이 설 때 활성화하려면 아래 주석을 해제한다(exact host에만 적용, 서브도메인 제외).
    # add_header Strict-Transport-Security "max-age=15552000" always;

    # 관리 폼(규칙 CRUD)만 받는다 — 대형 업로드가 없으므로 본문 상한을 좁게 고정한다.
    client_max_body_size 1m;

    # 보안 응답 헤더. 앱이 직접 붙이지 않으므로 엣지에서 한 층에만 부여한다(중복 방지).
    # always: 4xx/3xx(로그인 실패·리다이렉트) 응답에도 실린다.
    # location에서 add_header를 다시 쓰면 이 상속이 끊기므로, 하위엔 두지 않는다.
    add_header X-Frame-Options "DENY" always; # 관리 UI 클릭재킹 차단(프레임 임베드 불가)
    add_header X-Content-Type-Options "nosniff" always; # MIME 스니핑 차단
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP는 의도적으로 제외: 서버 렌더 템플릿의 인라인 스타일과 충돌해 오탐 위험이 크다.

    location / {
        proxy_pass http://nudge_app;
        proxy_http_version 1.1;

        # verify_origin(CSRF)과 url_for(절대 URL 생성)가 호스트 기준이라 원 Host를 포트째
        # 보존한다. $host는 포트를 떼어내므로 LAN IP:포트 직접 접근 시 정적 URL이 어긋난다.
        # $http_host는 클라이언트가 보낸 Host 원문이라 공개 도메인·LAN 두 경우를 다 맞춘다.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        # 이 리스너로 들어온 트래픽은 정의상 https다 — 앱의 스킴 판단을 확정한다.
        proxy_set_header X-Forwarded-Proto https;
        # 이 nginx가 신뢰 경계다 — 앞단은 프록시가 아니라 공유기 NAT라 이어붙일 상류 XFF가
        # 없다. 클라이언트가 보낸 XFF에 append하면(=$proxy_add_x_forwarded_for) 위조 통로만
        # 열리고, FORWARDED_ALLOW_IPS="*"인 uvicorn이 위조된 leftmost를 client로 채택한다.
        # 그래서 append가 아니라 실제 원격 주소로 덮어쓴다(NAT가 원 출발지 IP를 보존).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;

        # keepalive 업스트림에는 Connection 헤더를 비워야 연결이 재사용된다.
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
